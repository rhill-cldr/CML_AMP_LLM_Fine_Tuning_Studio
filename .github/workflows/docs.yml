name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/current/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install D2
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s --
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install mdbook preprocessors
        run: |
          # mdbook-d2
          MDBOOK_D2_VERSION="v0.3.8"
          curl -sSL "https://github.com/danieleades/mdbook-d2/releases/download/${MDBOOK_D2_VERSION}/mdbook-d2-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          chmod +x mdbook-d2
          sudo mv mdbook-d2 /usr/local/bin/

      - name: Build documentation
        run: |
          cd docs/current
          mdbook build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/current/book'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
